<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับ-รายจ่าย</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; }
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .navbar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-nav { text-decoration: none; color: #666; font-size: 14px; font-weight: 600; padding: 8px 15px; border-radius: 20px; background: #f0f0f0; }
        
        .balance-card { text-align: center; margin-bottom: 20px; }
        #balance { font-size: 32px; font-weight: 700; color: #2c3e50; }
        
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        button#submit-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        
        li { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-action { border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; color: white; margin-left: 5px; }
        .edit-btn { background: #f39c12; }
        .delete-btn { background: var(--danger); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

<div class="container">
    <div class="navbar">
        <a href="index.html" class="btn-nav">← หน้าแรก</a>
        <a href="dashboard.html" class="btn-nav">สรุปผล →</a>
    </div>
    
    <div class="balance-card">
        <p style="margin:0; color:#888;">ยอดคงเหลือ</p>
        <div id="balance">฿0.00</div>
    </div>

    <form id="form">
        <input type="date" id="date" required>
        <input type="text" id="text" placeholder="รายการ" required>
        <input type="number" id="amount" placeholder="จำนวนเงิน" required>
        <select id="type"><option value="plus">รายรับ</option><option value="minus">รายจ่าย</option></select>
        <button type="submit" id="submit-btn">บันทึกรายการ</button>
    </form>

    <ul id="list"></ul>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>แก้ไขรายการ</h3>
        <input type="date" id="editDate">
        <input type="text" id="editText">
        <input type="number" id="editAmount">
        <button onclick="saveEdit()" style="width:100%; background:var(--success); color:white; border:none; padding:10px; margin-top:10px; border-radius:8px;">บันทึก</button>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    let editId = null;

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const t = { id: Date.now(), date: date.value, text: text.value, amount: type.value === 'minus' ? -Math.abs(amount.value) : Math.abs(amount.value) };
        transactions.push(t);
        update();
        form.reset();
    });

    function update() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
        render();
    }

    function render() {
        list.innerHTML = '';
        transactions.sort((a,b) => new Date(b.date) - new Date(a.date));
        transactions.forEach(t => {
            list.innerHTML += `<li>
                <div><b>${t.date}</b><br>${t.text}</div>
                <div><span style="color:${t.amount>0?'#2ecc71':'#e74c3c'}">${t.amount}</span>
                <button class="btn-action edit-btn" onclick="openEdit(${t.id})">แก้</button>
                <button class="btn-action delete-btn" onclick="del(${t.id})">ลบ</button></div>
            </li>`;
        });
        const total = transactions.reduce((acc, t) => acc + t.amount, 0);
        document.getElementById('balance').innerText = '฿' + total.toLocaleString();
    }
    
    function del(id) { transactions = transactions.filter(t => t.id !== id); update(); }
    function openEdit(id) { 
        editId = id; 
        const t = transactions.find(t => t.id === id);
        editDate.value = t.date; editText.value = t.text; editAmount.value = Math.abs(t.amount);
        document.getElementById('editModal').style.display = 'flex';
    }
    function saveEdit() {
        const t = transactions.find(t => t.id === editId);
        t.date = editDate.value; t.text = editText.value; 
        t.amount = t.amount < 0 ? -Math.abs(editAmount.value) : Math.abs(editAmount.value);
        document.getElementById('editModal').style.display = 'none';
        update();
    }
    render();
</script>
</body>
</html>
