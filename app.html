<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่าย</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .balance-container { text-align: center; margin-bottom: 20px; }
        #balance { font-size: 32px; font-weight: 600; color: #2c3e50; }
        
        .inc-exp-container { display: flex; justify-content: space-between; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; }
        .money { font-size: 18px; font-weight: 600; margin-top: 5px; }
        .plus { color: #2ecc71; }
        .minus { color: #e74c3c; }
        
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: 600; }
        
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; padding: 10px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; border-radius: 6px; border-right: 5px solid #ccc; }
        li.plus { border-right-color: #2ecc71; }
        li.minus { border-right-color: #e74c3c; }
        
        .btn-action { border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; margin-left: 5px; }
        .edit-btn { background: #f39c12; }
        .delete-btn { background: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>บันทึกรายรับ-รายจ่าย</h2>
        <a href="index.html">กลับหน้าแรก</a>
    </div>
    
    <div class="balance-container">
        <h4>ยอดคงเหลือ</h4>
        <div id="balance">฿0.00</div>
    </div>

    <div class="inc-exp-container">
        <div><h4>รายรับ</h4><p id="money-plus" class="money plus">+฿0.00</p></div>
        <div><h4>รายจ่าย</h4><p id="money-minus" class="money minus">-฿0.00</p></div>
    </div>

    <form id="form">
        <input type="date" id="date" required />
        <input type="text" id="text" placeholder="รายการ" required />
        <input type="number" id="amount" placeholder="จำนวนเงิน" required min="1" />
        <select id="type">
            <option value="plus">รายรับ</option>
            <option value="minus">รายจ่าย</option>
        </select>
        <button type="submit">เพิ่มรายการ</button>
    </form>

    <ul id="list"></ul>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    const form = document.getElementById('form');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const transaction = {
            id: Date.now(),
            date: document.getElementById('date').value,
            text: document.getElementById('text').value,
            amount: document.getElementById('type').value === 'minus' ? -Math.abs(document.getElementById('amount').value) : Math.abs(document.getElementById('amount').value)
        };
        transactions.push(transaction);
        updateStorageAndUI();
        form.reset();
    });

    function updateStorageAndUI() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
        render();
    }

    window.removeTransaction = (id) => {
        transactions = transactions.filter(t => t.id !== id);
        updateStorageAndUI();
    };

    window.editTransaction = (id) => {
        const t = transactions.find(t => t.id === id);
        const newText = prompt("แก้ไขรายการ:", t.text);
        const newAmount = prompt("แก้ไขจำนวนเงิน:", Math.abs(t.amount));
        if (newText && newAmount) {
            t.text = newText;
            t.amount = t.amount < 0 ? -Math.abs(newAmount) : Math.abs(newAmount);
            updateStorageAndUI();
        }
    };

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        transactions.forEach(t => {
            const li = document.createElement('li');
            li.className = t.amount < 0 ? 'minus' : 'plus';
            li.innerHTML = `
                <span>${t.date}
