<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ledger - Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h2 { color: white; text-align: center; margin-bottom: 20px; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* ตารางสวยๆ */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: #7f8c8d; padding: 12px; border-bottom: 2px solid #eee; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #2c3e50; }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 25px;
            padding: 12px;
            background: #f8f9fa;
            color: #667eea;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-back:hover { background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 สรุปภาพรวมการเงิน</h2>
    
    <div class="card">
        <table id="data-table">
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>รายการ</th>
                    <th>จำนวน (฿)</th>
                </tr>
            </thead>
            <tbody id="transaction-table-body">
                </tbody>
        </table>
        <a href="app.html" class="btn-back">← กลับไปหน้าบันทึก</a>
    </div>
</div>

<script>
    function loadDashboard() {
        // ดึงข้อมูลจาก localStorage
        const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        const tbody = document.getElementById('transaction-table-body');
        tbody.innerHTML = '';

        // เรียงลำดับรายการตามวันที่ล่าสุด
        transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

        transactions.forEach(t => {
            // ปรับรูปแบบวันที่เป็น วัน/เดือน/ปี (ถ้าต้องการ)
            let displayDate = t.date;
            if(t.date) {
                const dateParts = t.date.split('-'); // แปลงจาก YYYY-MM-DD
                if(dateParts.length === 3) {
                    displayDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                }
            }

            tbody.innerHTML += `<tr>
                <td>${displayDate || '-'}</td>
                <td>${t.text || '-'}</td>
                <td style="color: ${t.amount >= 0 ? '#2ecc71' : '#e74c3c'}">
                    ${parseFloat(t.amount).toLocaleString()}
                </td>
            </tr>`;
        });
    }

    loadDashboard();
</script>
</body>
</html>
