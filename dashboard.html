<table style="width:100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
        <tr style="background: #f8f9fa;">
            <th style="padding: 10px; border-bottom: 2px solid #ddd;">วันที่</th>
            <th style="padding: 10px; border-bottom: 2px solid #ddd;">รายการ</th>
            <th style="padding: 10px; border-bottom: 2px solid #ddd;">จำนวน</th>
        </tr>
    </thead>
    <tbody id="transaction-table-body">
        </tbody>
</table>

<script>
    const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    const tbody = document.getElementById('transaction-table-body');
    transactions.forEach(t => {
        tbody.innerHTML += `<tr>
            <td style="padding: 10px; border-bottom: 1px solid #eee;">${t.date || '-'}</td>
            <td style="padding: 10px; border-bottom: 1px solid #eee;">${t.text || '-'}</td>
            <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: right;">${t.amount || 0}</td>
        </tr>`;
    });
</script>
