<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>My Ledger - Dashboard</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .value { font-size: 24px; font-weight: 700; color: #2c3e50; }
        .controls { margin-bottom: 20px; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 สรุปภาพรวมการเงิน</h2>
    
    <div class="summary-cards">
        <div class="card"><p>รายรับ</p><div id="total-income" class="value">0</div></div>
        <div class="card"><p>รายจ่าย</p><div id="total-expense" class="value">0</div></div>
        <div class="card"><p>คงเหลือ</p><div id="balance" class="value">0</div></div>
    </div>

    <div class="controls">
        <select id="time-filter" onchange="updateDashboard()">
            <option value="daily">รายวัน</option>
            <option value="monthly">รายเดือน</option>
            <option value="yearly">รายปี</option>
        </select>
    </div>

    <table id="data-table">
        <thead><tr><th>วันที่</th><th>รายการ</th><th>จำนวน</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
    
    <br>
    <a href="app.html">← กลับไปหน้าบันทึก</a>
</div>


<script>
    function updateDashboard() {
        const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let income = 0, expense = 0;

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        transactions.forEach(t => {
            if(t.type === 'income') income += parseFloat(t.amount);
            else expense += parseFloat(t.amount);

            tbody.innerHTML += `<tr><td>${t.date}</td><td>${t.name}</td><td>${t.amount}</td></tr>`;
        });

        document.getElementById('total-income').innerText = income.toLocaleString();
        document.getElementById('total-expense').innerText = expense.toLocaleString();
        document.getElementById('balance').innerText = (income - expense).toLocaleString();
    }

    // เรียกทำงานเมื่อโหลดหน้า
    updateDashboard();
    const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    const tbody = document.getElementById('transaction-table-body');
    transactions.forEach(t => {
        tbody.innerHTML += `<tr>
            <td style="padding: 10px; border-bottom: 1px solid #eee;">${t.date || '-'}</td>
            <td style="padding: 10px; border-bottom: 1px solid #eee;">${t.text || '-'}</td>
            <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: right;">${t.amount || 0}</td>
        </tr>`;
    });
</script>
</body>
</html>
